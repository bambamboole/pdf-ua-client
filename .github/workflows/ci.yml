name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  js:
    name: JS (lint, format, typecheck, vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run fmt:check

      - run: npm run lint:github

      - run: npm run typecheck

      - run: npm test

  php:
    name: PHP (pint, phpstan, pest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Resolve composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - run: composer install --prefer-dist --no-progress --no-interaction

      - name: Pint (style check)
        run: composer test:lint

      - name: PHPStan
        run: composer analyse

      - name: Pest
        run: |
          # Workaround for pestphp/pest#XXXX: the Cache plugin calls
          # realpath() on vendor/pestphp/pest/.temp which isn't shipped
          # in the published package, so on a fresh install --cache-directory
          # gets pushed with an empty value and PHPUnit aborts.
          mkdir -p vendor/pestphp/pest/.temp
          composer test
